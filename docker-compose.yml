services:
  reso:
    build: .
    # drop all caps, only allow binding to privileged ports (53, 80)
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # no privilege escalation
    security_opt:
      - no-new-privileges:true
    # filesystem is read-only, only /data is writable
    read_only: true
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80"
    volumes:
      - reso-data:/data
    environment:
      RESO_DATABASE_PATH: /data/reso.db
      # generate with: openssl rand -base64 32
      RESO_COOKIE_SECRET: ${RESO_COOKIE_SECRET:?RESO_COOKIE_SECRET is required}

volumes:
  reso-data:
