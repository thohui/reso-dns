services:
  reso:
    network_mode: host
    build: .
    # drop all caps, only allow binding to privileged ports (53, 80)
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # filesystem is read-only, only /data is writable
    read_only: true
    volumes:
      - reso-data:/data
    environment:
      RESO_DATABASE_PATH: /data/reso.db
      RESO_METRICS_DATABASE_PATH: /data/reso-metrics.db
      # generate with: openssl rand -base64 32
      RESO_COOKIE_SECRET: ${RESO_COOKIE_SECRET:?RESO_COOKIE_SECRET is required}

volumes:
  reso-data:
